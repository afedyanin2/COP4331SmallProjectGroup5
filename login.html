<body style="min-height:100vh; padding-top:120px">

<nav class="navbar navbar-expand-sm navbar-dark fixed-top custom-navbar">
	<div class="container-fluid">
		<a class="navbar-brand" href="main_logged_out.html">

		<a href="login.html" class="btn btn-light" type="button">Log In</a>
	</div>

<div class="container">
	<div class="row justify-content-center">
	<div class="col-12 col-md-8">
	<div class="card p-4">
		<h2 class="text-center">Sign In</h2>

		<form action="/Login.php">
			<div class="mb-3 mt-3">
				<label for="username" class="form-label">Username:</label>
				<input type="text" class="form-control" id="username" placeholder="Enter username" name="username" required>
			</div>	
			<div class="mb-3">
				<label for="pwd" class="form-label">Password:</label>
				<input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
			</div>
			<div class="form-check mb-3">
				<label class="form-check-label">
				<input class="form-check-input" type="checkbox" name="remember"> Remember me
				</label>
			</div>
			<div class="d-grid">
				<button type="submit" class="btn btn-primary">Log In</button>
			</div>
		</form>
		
		<i>
			<p class="text-center" style="margin-top:80px">
				Don't have an account?
				<a href="sign_up.html">Create a new account.</a>
			</p>
		</i>
	</div>
	</div>
	</div>
</div>
