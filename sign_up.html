<!DOCTYPE html>
<html lang="en">
<head>
		<title>Main Page (Logged Out)</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- Latest compiled and minified CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
		<link href="styles.css" rel="stylesheet">
		<!-- Latest compiled JavaScript -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
		<script src="js/code.js" defer></script>
</head>

<body style="min-height:100vh; padding-top:120px">

<nav class="navbar navbar-expand-sm navbar-dark fixed-top custom-navbar">
	<div class="container-fluid">
		<a class="navbar-brand" href="main_logged_out.html">
		<i class="bi bi-cloud"></i>
		CloudContacts
		</a>
		<a href="login.html" class="btn btn-light" type="button">Log In</a>
	</div>
</nav>

<div class="container">
	<div class="row justify-content-center">
	<div class="col-12 col-md-8">
	<div class="card p-4">
		<h2 class="text-center">Sign Up</h2>

		<form id="signupForm">
			<div class="mb-3 mt-3">
				<label for="firstName" class="form-label">First Name:</label>
				<input type="text" class="form-control" id="firstName" placeholder="Enter first name" name="firstName" required>
			</div>
			<div class="mb-3">
				<label for="lastName" class="form-label">Last Name:</label>
				<input type="text" class="form-control" id="lastName" placeholder="Enter last name" name="lastName" required>
			</div>
			<div class="mb-3">
				<label for="username" class="form-label">Username:</label>
				<input type="text" class="form-control" id="username" placeholder="Enter username" name="username" required>
			</div>	
			<div class="mb-3">
				<label for="password" class="form-label">Password:</label>
				<input type="password" class="form-control" id="password" placeholder="Enter password" name="password" required>
			</div>
			<div class="mb-3">
				<label for="confirmPassword" class="form-label">Re-type Password:</label>
				<input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter password" name="confirmPassword" required>
			</div>
			<div class="d-grid">
				<button type="submit" class="btn btn-primary">Create</button>
			</div>
			<p id="registerResult" class="text-danger text-center mt-3"></p>
		</form>
		
		<i>
			<p class="text-center" style="margin-top:80px">
				Already have an account?
				<a href="login.html">Sign In.</a>
			</p>
		</i>
	</div>
	</div>
	</div>
</div>

</body>
</html>
