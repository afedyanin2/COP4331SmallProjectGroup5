<!DOCTYPE html>
<html lang="en">
<head>
		<title>Main Page (Logged Out)</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- Latest compiled and minified CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
		<!-- Latest compiled JavaScript -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
		<script src="js/code.js" defer></script>
</head>

<body style="min-height:100vh; padding-top:120px">

<nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
	<div class="container-fluid">
		<a class="navbar-brand" href="#">
		<i class="bi bi-cloud"></i>
		CloudContacts
		</a>
		<button class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#logoutModal">Log Out</button>
	</div>
</nav>

<div class="container">
	<div class="row justify-content-center">
	<div class="col-12 col-md-8">
	
		<!-- search bar & add contact button -->
		<div class="d-flex gap-2 mb-3">
			<form id="searchForm" class="input-group flex-grow-1">
				<input type="text" id="searchInput" class="form-control" placeholder="Search Contacts" aria-label="Search contacts">
				<button class="input-group-text bg-white border-start-0" type="submit">
					<i class="bi bi-search"></i>
				</button>

			</form>
			<button class="btn btn-primary text-nowrap" data-bs-toggle="modal" data-bs-target="#addContactModal">
				<i class="bi bi-plus-circle"></i>
				Add Contact
			</button>
		</div>
	
		<!-- Javascript used to build table -->
		<table class="table table-hover">
			<tbody id="contactTable">
				<tr id="emptyState">
					<td class="text-center text-muted py-4">
						<i class="bi bi-person-x fs-3 d-block mb-2"></i>
						No contacts found. Add one to get started!
					</td>
				</tr>
			</tbody>
		</table>

	</div>
	</div>
</div>


<!-- Log Out Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutmodalLabel" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content p-2">

		<div class="modal-body text-center">
			<h5 id="logoutModalLabel">Are you sure you want to log out?</h5>
		</div>

		<div class="modal-footer justify-content-center">
			<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
			Cancel
			</button>
			
			<!-- logout function called when clicking Log Out -->
			<button type="button" class="btn btn-danger" onclick="logout()">
			Log Out
			</button>
		</div>

		</div>
	</div>
</div>


<!-- Add Contact Modal -->
<div class="modal fade" id="addContactModal" tabindex="-1" aria-labelledby="addContactModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content p-3">
      
			<div class="modal-header">
				<h5 class="modal-title" id="addContactModalLabel">Add New Contact</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>

			<form id="addContactForm">
				<div class="modal-body">
				<div class="mb-3">
					<label for="first-name" class="form-label">First Name:</label>
					<input type="text" class="form-control" id="first-name" placeholder="First Name" name="firstName" required>
				</div>
				<div class="mb-3">
					<label for="last-name" class="form-label">Last Name:</label>
					<input type="text" class="form-control" id="last-name" placeholder="Last Name" name="lastName">
				</div>
				<div class="mb-3">
					<label for="phone-num" class="form-label">Phone Number:</label>
					<input type="text" class="form-control" id="phone-num" placeholder="Phone Number" name="phoneNum">
				</div>
				<div class="mb-3">
					<label for="user-email" class="form-label">Email:</label>
					<input type="email" class="form-control" id="user-email" placeholder="Email" name="emailAddress">
				</div>
				</div>
        
				<div class="modal-footer d-grid">
				<button type="submit" class="btn btn-primary">Add Contact</button>
				</div>
			</form>

		</div>
	</div>
</div>


</body>
</html>
