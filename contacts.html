<!DOCTYPE html>
<html lang="en">
<head>
		<title>Main Page (Logged Out)</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- Latest compiled and minified CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
		<!-- Latest compiled JavaScript -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
		<script src="code.js" defer></script>
</head>

<body style="min-height:100vh; padding-top:120px">

<nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
	<div class="container-fluid">
		<a class="navbar-brand" href="#">
		<i class="bi bi-cloud"></i>
		CloudContacts
		</a>
		<a href="login.html" class="btn btn-primary">Log In</a>
	</div>
</nav>

<div class="container">
	<div class="row justify-content-center">
	<div class="col-12 col-md-8">
	
		<!-- search bar & add contact button -->
		<div class="d-flex gap-2 mb-3">
			<form id="searchForm" class="input-group flex-grow-1">
				<input type="text" id="searchInput" class="form-control" placeholder="Search Contacts">
				<button class="input-group-text bg-white border-start-0" type="submit">
					<i class="bi bi-search"></i>
				</button>

			</form>
			<button class="btn btn-primary text-nowrap">
				<i class="bi bi-plus-circle"></i>
				Add Contact
			</button>
		</div>
	
		<!-- Javascript used to build table -->
		<table class="table table-hover">
			<tbody id="contactTable"></tbody>
		</table>

	</div>
	</div>
</div>

</body>
</html>
